---
argument_specs:
  main:
    options:
      bash_aliases:
        type: dict
        description: Bash alias definitions
      bash_aliases_extra:
        type: dict
        default: {}
        description: Extra aliases
      bash_aliases_skip:
        type: list
        elements: str
        default: []
        description: Aliases to skip
      bash_environment:
        type: dict
        description: Environment variable definitions
      bash_environment_extra:
        type: dict
        default: {}
        description: Extra environment variables
      bash_environment_skip:
        type: list
        elements: str
        default: []
        description: Environment variables to skip
      bash_functions:
        type: dict
        default: {}
        description: Function definitions
      bash_functions_extra:
        type: dict
        default: {}
        description: Extra functions
      bash_functions_skip:
        type: list
        elements: str
        default: []
        description: Functions to skip
      bash_history_file_size:
        type: int
        default: 9999
        description: Number of commands to keep in history file
      bash_history_options:
        type: list
        elements: str
        default:
          - histappend
          - histverify
        description: History options to set
      bash_history_size:
        type: int
        default: 9999
        description: Number of commands to keep in memory history
      bash_history_time_format:
        type: str
        default: "[%F %T] "
        description: Format string for bash history timestamps
      bash_locale:
        type: str
        default: en_US.UTF-8
        description: Locale setting for LC_ALL and LANG variables
      bash_pager:
        type: str
        default: less -X
        description: Default pager program
      bash_paths:
        type: list
        elements: str
        default:
          - ~/.local/bin
          - ~/bin
        description: Directories to add to PATH
      bash_paths_extra:
        type: list
        elements: str
        default: []
        description: Extra paths
      bash_paths_skip:
        type: list
        elements: str
        default: []
        description: Default paths to skip
      bash_prompt:
        type: str
        description: Bash prompt configuration function
      bash_sources:
        type: list
        elements: str
        default:
          - /usr/share/bash-completion/bash_completion
        description: Files to source in bash configuration
      bash_sources_extra:
        type: list
        elements: str
        default: []
        description: Extra files to source
      bash_sources_skip:
        type: list
        elements: str
        default: []
        description: Source files to skip
      bash_ssh_agent:
        type: bool
        default: false
        description: Flag to start persistent SSH agent in login shells
      bash_umask:
        type: str
        default: "0022"
        description: User file creation mask

dependencies:
  - role: sysengquick.fedora.user
